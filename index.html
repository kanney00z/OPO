<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สั่งอาหารออนไลน์ - Foodie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f8fafc;
        }
        .receipt-container {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        .dotted-line {
            border-top: 2px dotted #e2e8f0;
        }
        @media print {
            body * {
                visibility: hidden;
            }
            #receiptModal, #receiptModal * {
                visibility: visible;
            }
            #receiptModal {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                background-color: white;
                display: flex !important;
                justify-content: center;
                align-items: flex-start;
                padding-top: 20px;
            }
            #receiptModal .bg-black {
                display: none;
            }
            #receiptModal button {
                display: none;
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="order-card" class="bg-white rounded-3xl shadow-xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-orange-600 mb-2">สั่งอาหาร</h1>
            <p class="text-gray-500">ใส่ความอร่อยที่คุณต้องการได้ที่นี่</p>
        </div>

        <form id="orderForm" class="space-y-6">
            <!-- Food Name -->
            <div>
                <label for="foodName" class="block text-sm font-medium text-gray-700 mb-1">เมนูที่อยากทาน</label>
                <input type="text" id="foodName" name="foodName" required
                    placeholder="เช่น กะเพราไก่ไข่ดาว"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition duration-200">
            </div>

            <!-- Special Instructions -->
            <div>
                <label for="instructions" class="block text-sm font-medium text-gray-700 mb-1">สิ่งที่ไม่ต้องการ / หมายเหตุ</label>
                <textarea id="instructions" name="instructions" rows="2"
                    placeholder="เช่น ไม่เผ็ด ไม่ใส่หอมใหญ่"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition duration-200"></textarea>
            </div>

            <!-- Order Type -->
            <div class="grid grid-cols-2 gap-4">
                <label class="cursor-pointer">
                    <input type="radio" name="orderType" value="dine-in" checked class="hidden peer">
                    <div class="p-3 text-center rounded-xl border-2 border-gray-100 peer-checked:border-orange-500 peer-checked:bg-orange-50 peer-checked:text-orange-600 hover:bg-gray-50 transition duration-200">
                        ทานที่นี่
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="orderType" value="takeaway" class="hidden peer">
                    <div class="p-3 text-center rounded-xl border-2 border-gray-100 peer-checked:border-orange-500 peer-checked:bg-orange-50 peer-checked:text-orange-600 hover:bg-gray-50 transition duration-200">
                        กลับบ้าน
                    </div>
                </label>
            </div>

            <!-- Phone Number (Hidden by default) -->
            <div id="phoneSection" class="hidden transition-all duration-300">
                <label for="phoneNumber" class="block text-sm font-medium text-gray-700 mb-1">เบอร์โทรศัพท์</label>
                <input type="tel" id="phoneNumber" name="phoneNumber"
                    placeholder="08X-XXX-XXXX"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition duration-200">
            </div>

            <!-- Submit Button -->
            <button type="submit"
                class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:shadow-orange-200 transition duration-300 transform hover:-translate-y-1">
                สั่งอาหารเลย!
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <a href="admin.html" class="text-xs text-gray-400 hover:text-orange-500 transition duration-200">
                เข้าหน้าหลังบ้าน (สำหรับเจ้าของร้าน)
            </a>
        </div>
    </div>

    <!-- Receipt Modal (Hidden by default) -->
    <div id="receiptModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-8 w-full max-w-sm relative receipt-container">
            <div class="text-center mb-6">
                <div class="text-2xl font-bold tracking-widest text-gray-800">FOODIE</div>
                <div class="text-xs text-gray-400 mt-1 uppercase">Delicious Receipt</div>
            </div>

            <div class="dotted-line my-4"></div>

            <div class="space-y-4">
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">เลขที่ออเดอร์:</span>
                    <span class="font-medium text-gray-800" id="receiptOrderId">#0000</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">วันที่:</span>
                    <span class="font-medium text-gray-800" id="receiptDate">--/--/--</span>
                </div>
                
                <div class="dotted-line my-4"></div>

                <div>
                    <div class="text-sm font-semibold text-gray-800 mb-1">รายการอาหาร:</div>
                    <div class="text-lg text-orange-600 font-bold" id="receiptFood">---</div>
                </div>

                <div id="receiptInstructionBlock">
                    <div class="text-xs font-semibold text-gray-500 mb-1">หมายเหตุ:</div>
                    <div class="text-sm text-gray-600 italic" id="receiptInstructions">---</div>
                </div>

                <div class="flex justify-between items-center py-2 px-3 bg-gray-50 rounded-lg mb-2">
                    <span class="text-sm text-gray-500">รูปแบบ:</span>
                    <span class="text-sm font-semibold px-2 py-1 rounded bg-orange-100 text-orange-700" id="receiptType">---</span>
                </div>

                <div class="flex justify-between items-center py-2 px-3 bg-gray-100 rounded-lg">
                    <span class="text-sm text-gray-500">ราคาสุทธิ:</span>
                    <span class="text-lg font-bold text-orange-600" id="receiptPriceDisplay">รอแอดมินสรุปราคา</span>
                </div>

                <div id="receiptPhoneBlock" class="flex justify-between text-sm hidden">
                    <span class="text-gray-500">เบอร์โทร:</span>
                    <span class="font-medium text-gray-800" id="receiptPhone">---</span>
                </div>
            </div>

            <div class="dotted-line my-6"></div>

            <div class="text-center">
                <p class="text-xs text-gray-400 mb-4 italic">ขอบคุณที่มาใช้บริการ! ขอให้ทานให้อร่อยนะคะ</p>
                <button onclick="window.print()"
                    class="w-full bg-gray-800 text-white font-bold py-3 rounded-xl mb-2 hover:bg-gray-900 transition duration-200 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                    </svg>
                    พิมพ์บิล
                </button>
                <button onclick="closeReceipt()"
                    class="w-full border-2 border-orange-500 text-orange-500 hover:bg-orange-50 font-bold py-3 rounded-xl transition duration-200">
                    ปิดหน้าจอนี้
                </button>
            </div>
        </div>
    </div>

    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://axmgnqcefaavzdabkeoz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4bWducWNlZmFhdnpkYWJrZW96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzYyMzgsImV4cCI6MjA4OTQ1MjIzOH0.Me506lvdmalroyH02f3UgxHPLxoogAoBHaZhJad_Pjc';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById('orderForm');
        const phoneSection = document.getElementById('phoneSection');
        const phoneNumber = document.getElementById('phoneNumber');
        const receiptModal = document.getElementById('receiptModal');
        const orderCard = document.getElementById('order-card');

        // Handle order type change
        document.querySelectorAll('input[name="orderType"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.value === 'takeaway') {
                    phoneSection.classList.remove('hidden');
                    phoneNumber.required = true;
                } else {
                    phoneSection.classList.add('hidden');
                    phoneNumber.required = false;
                }
            });
        });

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'กำลังส่งออเดอร์...';

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            const orderId = '#' + Math.floor(Math.random() * 9000 + 1000);

            try {
                // Save to Supabase
                const { data: insertedData, error } = await supabaseClient
                    .from('orders')
                    .insert([
                        {
                            order_id: orderId,
                            food_name: data.foodName,
                            instructions: data.instructions,
                            order_type: data.orderType,
                            phone_number: data.orderType === 'takeaway' ? data.phoneNumber : null,
                            price: 0, // Default price, admin will set it later
                            status: 'pending'
                        }
                    ]);

                if (error) throw error;

                // Populate Receipt
                document.getElementById('receiptOrderId').textContent = orderId;
                document.getElementById('receiptDate').textContent = new Date().toLocaleString('th-TH');
                document.getElementById('receiptFood').textContent = data.foodName;
                
                if (data.instructions) {
                    document.getElementById('receiptInstructions').textContent = data.instructions;
                    document.getElementById('receiptInstructionBlock').classList.remove('hidden');
                } else {
                    document.getElementById('receiptInstructionBlock').classList.add('hidden');
                }

                const typeLabel = data.orderType === 'dine-in' ? 'ทานที่นี่' : 'กลับบ้าน';
                document.getElementById('receiptType').textContent = typeLabel;

                if (data.orderType === 'takeaway') {
                    document.getElementById('receiptPhone').textContent = data.phoneNumber;
                    document.getElementById('receiptPhoneBlock').classList.remove('hidden');
                } else {
                    document.getElementById('receiptPhoneBlock').classList.add('hidden');
                }

                // Show Receipt
                receiptModal.classList.remove('hidden');
                receiptModal.classList.add('animate-fade-in');

            } catch (err) {
                console.error('Error saving order:', err);
                alert('เกิดข้อผิดพลาด: ' + (err.message || 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้') + '\n\nกรุณาตรวจสอบว่าได้สร้างตาราง orders และตั้งค่า RLS ใน Supabase แล้ว');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalBtnText;
            }
        });

        function closeReceipt() {
            receiptModal.classList.add('hidden');
            form.reset();
            phoneSection.classList.add('hidden');
            phoneNumber.required = false;
        }
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</body>
</html>
